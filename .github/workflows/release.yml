name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - module-sdk
          - module-cli
      version:
        description: "Version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm --filter '!@lumen-media/example-*' -r build

      - name: Bump version
        run: |
          PKG="packages/${{ github.event.inputs.package }}"
          npm pkg set version=${{ github.event.inputs.version }} --prefix "$PKG"

      - name: Publish to npm
        run: pnpm --filter @lumen-media/${{ github.event.inputs.package }} publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/${{ github.event.inputs.package }}/package.json
          git diff --staged --quiet || git commit -m "chore(${{ github.event.inputs.package }}): bump to ${{ github.event.inputs.version }} [skip ci]"
          git push origin main

      - name: Create GitHub release
        run: |
          gh release create "${{ github.event.inputs.package }}-v${{ github.event.inputs.version }}" \
            --title "${{ github.event.inputs.package }} v${{ github.event.inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
