name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == sdk-v* ]]; then
            echo "package=module-sdk" >> $GITHUB_OUTPUT
            echo "version=${TAG#sdk-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == cli-v* ]]; then
            echo "package=module-cli" >> $GITHUB_OUTPUT
            echo "version=${TAG#cli-v}" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag format: $TAG (expected sdk-vX.Y.Z or cli-vX.Y.Z)"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm --filter '!@lumen-media/example-*' -r build

      - name: Bump version
        run: npm pkg set version=${{ steps.tag.outputs.version }} --prefix packages/${{ steps.tag.outputs.package }}

      - name: Publish to npm
        run: pnpm --filter @lumen-media/${{ steps.tag.outputs.package }} publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/${{ steps.tag.outputs.package }}/package.json
          git diff --staged --quiet || git commit -m "chore(${{ steps.tag.outputs.package }}): bump to ${{ steps.tag.outputs.version }} [skip ci]"
          git push origin main
